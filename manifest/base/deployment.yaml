apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-mr-blocker
  labels:
    app: gitlab-mr-blocker
    app.kubernetes.io/name: gitlab-mr-blocker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab-mr-blocker
  template:
    metadata:
      labels:
        app: gitlab-mr-blocker
        app.kubernetes.io/name: gitlab-mr-blocker
    spec:
      imagePullSecrets:
        - name: gitlab-mr-blocker-registry-secret
      containers:
        - name: gitlab-mr-blocker
          image: __IMAGE__
          imagePullPolicy: Always
          command:
            - uvicorn
          args:
            - main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          envFrom:
            - secretRef:
                name: gitlab-mr-blocker-secret
          ports:
            - name: http
              containerPort: 8000
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
